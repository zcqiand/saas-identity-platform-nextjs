# =============================================================================
# deploy/nginx.conf — 容器内 nginx 配置
#
# 角色：SPA 静态文件 serve + 缓存 + gzip + 反代 dynamic 请求到 Node server。
# 和老项目 saas-identity-platform/DEPLOYMENT.md §2 同构，只是反代目标
# 从「无」变成「http://127.0.0.1:3000」（standalone next server）。
#
# 端口：容器内 listen 80（gateway），对外由 docker run -p 决定（VPS 上是 8065）。
# =============================================================================

user nginx;
worker_processes auto;
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # 临时文件放 /tmp，容器里 /var 可能在只读 fs。
    client_body_temp_path /tmp/client_body_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/font-woff
        application/font-woff2
        image/svg+xml;

    # 缓存：Next.js standalone 给静态资源加的 hash 文件名，
    # 浏览器可以直接 1y 缓存。
    map $sent_http_content_type $expires {
        default                    off;
        application/json           off;
        text/html                  off;
        text/css                   1y;
        application/javascript    1y;
        image/png                  1y;
        image/svg+xml              1y;
        font/woff2                 1y;
    }

    server {
        listen 80 default_server;
        server_name _;

        root /app/.next/static;
        # public/ 单独挂一个 location（不在 .next/static 下）
        # 见下方 location ^~ /_next/static 已处理

        # 安全头
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        expires $expires;

        # ---- Next.js 静态资源（hash 文件名，1y 缓存） ----
        # Next 15 把 build id 写在 URL 路径里，这里匹配带 _next/static 的请求
        location ^~ /_next/static {
            proxy_pass http://127.0.0.1:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # 静态资源缓存长一点（nginx 这一层不缓存，只设浏览器侧）
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # ---- /public/*（favicon.ico 等） ----
        location /public/ {
            alias /app/public/;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # ---- favicon ----
        location = /favicon.ico {
            alias /app/public/favicon.ico;
            access_log off;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }

        # ---- /data/（开发模式下 drizzle 生成的 favicon 等） ----
        # 实际项目里没有这一路径，留空防 404
        location = /robots.txt {
            return 404 "no robots";
        }

        # ---- 其它一切 → 反代到 Node server（standalone） ----
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_buffering on;
        }

        # 自定义错误页：让 Next server 处理（保持 SPA 路由一致）
        error_page 404 /404;
        error_page 500 502 503 504 /50x;
        location = /50x {
            return 503 "Service Unavailable";
        }
    }
}